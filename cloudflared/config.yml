tunnel: 9d241926-7a36-441a-bfac-2ff960946ea9
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: main.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: ttyd.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: dozzle.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: files.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: deploy.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  - hostname: auth.dockerstackagentscode.dpdns.org
    service: http://caddy:80
  # ── Wildcard (PHẢI ở cuối, ngay trước catch-all 404) ─────────────
  # Match mọi subdomain: ttyd001..ttyd100, agent, ... → vào Caddy.
  # Caddy sẽ phân định tiếp qua label trên container (ví dụ ttyd047
  # match container có label caddy=http://ttyd047.${DOMAIN}).
  # DNS yêu cầu (làm 1 lần ở Cloudflare dashboard):
  #   *.${DOMAIN}  CNAME  <tunnel-id>.cfargotunnel.com  (proxied)
  - hostname: "*.dockerstackagentscode.dpdns.org"
    service: http://caddy:80
  - service: http_status:404
